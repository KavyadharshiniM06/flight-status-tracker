<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Flight Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">✈️ Flight Tracker</h1>
            <p class="text-slate-400 text-sm">Create an account to get started</p>
        </div>

        <!-- Card -->
        <div class="bg-slate-900 rounded-2xl p-8 shadow-2xl border border-slate-800">

            <h2 class="text-white font-bold text-xl mb-6">Create account</h2>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="mb-4 px-4 py-3 rounded-lg text-sm
                        {{ 'bg-red-950 text-red-400 border border-red-800' if category == 'error'
                           else 'bg-green-950 text-green-400 border border-green-800' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endwith %}

            <form method="POST">

                <div class="mb-4">
                    <label class="block text-xs uppercase tracking-widest
                                  text-slate-400 mb-2">
                        Full Name
                    </label>
                    <input
                        name="name"
                        type="text"
                        placeholder="John Doe"
                        required
                        class="w-full bg-slate-800 border border-slate-700 text-slate-200
                               placeholder-slate-600 rounded-lg px-4 py-3 text-sm
                               focus:outline-none focus:border-blue-500 transition"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-xs uppercase tracking-widest
                                  text-slate-400 mb-2">
                        Email
                    </label>
                    <input
                        name="email"
                        type="email"
                        placeholder="you@example.com"
                        required
                        class="w-full bg-slate-800 border border-slate-700 text-slate-200
                               placeholder-slate-600 rounded-lg px-4 py-3 text-sm
                               focus:outline-none focus:border-blue-500 transition"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-xs uppercase tracking-widest
                                  text-slate-400 mb-2">
                        Phone (optional)
                    </label>
                    <input
                        name="phone"
                        type="tel"
                        placeholder="+91XXXXXXXXXX"
                        class="w-full bg-slate-800 border border-slate-700 text-slate-200
                               placeholder-slate-600 rounded-lg px-4 py-3 text-sm
                               focus:outline-none focus:border-blue-500 transition"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-xs uppercase tracking-widest
                                  text-slate-400 mb-2">
                        Password
                    </label>
                    <input
                        name="password"
                        type="password"
                        placeholder="••••••••"
                        required
                        class="w-full bg-slate-800 border border-slate-700 text-slate-200
                               placeholder-slate-600 rounded-lg px-4 py-3 text-sm
                               focus:outline-none focus:border-blue-500 transition"
                    >
                </div>

                <div class="mb-6">
                    <label class="block text-xs uppercase tracking-widest
                                  text-slate-400 mb-2">
                        Confirm Password
                    </label>
                    <input
                        name="confirm_password"
                        type="password"
                        placeholder="••••••••"
                        required
                        class="w-full bg-slate-800 border border-slate-700 text-slate-200
                               placeholder-slate-600 rounded-lg px-4 py-3 text-sm
                               focus:outline-none focus:border-blue-500 transition"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                           py-3 rounded-lg text-sm tracking-wide transition"
                >
                    Create Account
                </button>

            </form>

            <p class="text-center text-slate-500 text-sm mt-6">
                Already have an account?
                <a href="{{ url_for('auth.login') }}"
                   class="text-blue-400 hover:text-blue-300 transition">
                    Sign In
                </a>
            </p>

        </div>
    </div>

</body>
</html>
